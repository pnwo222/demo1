<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>纺院 H5 学校专区低保真原型</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#dde5ee;font-family:"Microsoft YaHei",Arial,sans-serif;color:#172033}.wrap{min-height:100vh;display:flex;gap:18px;justify-content:center;padding:18px}.phone{width:390px;max-width:100%;background:#f7f9fc;border:1px solid #b8c2d1;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(15,23,42,.18)}.side{width:360px;max-width:100%;background:#fff;border:1px solid #cfd7e3;border-radius:10px;padding:14px;overflow:auto;max-height:860px}.status{height:28px;background:#0f2430;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}.head{background:#1f7a8c;color:#fff;padding:14px}.head b{font-size:19px}.note{font-size:12px;color:#e2f3f5}.screen{min-height:640px;padding:12px 12px 70px}.page{display:none}.page.active{display:block}.card{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:12px;margin-bottom:10px}.banner{height:132px;background:#cfe8ed;border:1px dashed #6da9b4;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;color:#0f4652;font-weight:700;padding:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.icon{height:68px;background:#fff;border:1px solid #d8dee9;border-radius:8px;text-align:center;padding:7px 4px;font-size:12px;cursor:pointer}.icon b{display:block;font-size:18px;color:#1f7a8c}.list{display:grid;gap:8px}.item{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:10px}.muted{color:#667085;font-size:12px}.tabbar{position:absolute;bottom:0;left:0;right:0;height:56px;background:#fff;border-top:1px solid #d8dee9;display:grid;grid-template-columns:repeat(4,1fr)}.tab{border:0;background:#fff;color:#667085}.tab.active{color:#1f7a8c;font-weight:700}.phone-inner{position:relative}.btn{height:36px;border:0;background:#1f7a8c;color:#fff;border-radius:8px;padding:0 12px}.btn.secondary{background:#eef3f7;color:#1f7a8c}.field{width:100%;height:38px;border:1px solid #cfd7e3;border-radius:8px;padding:0 10px;margin:6px 0}.tag{display:inline-block;border-radius:999px;padding:2px 8px;background:#e7f4f0;color:#16845b;font-size:12px}.tag.warn{background:#fff3e2;color:#b7791f}.tag.bad{background:#ffe8ec;color:#d1495b}.risk{border-color:#f0d08a;background:#fff8e8;color:#875600}.matrix{width:100%;border-collapse:collapse;font-size:12px}.matrix th,.matrix td{border:1px solid #d8dee9;padding:6px;vertical-align:top}.matrix th{background:#eef3f7}.navlist{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.navlist button{border:1px solid #cfd7e3;background:#fff;border-radius:6px;padding:7px;text-align:left}.navlist button.active{border-color:#1f7a8c;color:#1f7a8c}.section-title{font-weight:700;margin:8px 0}.record{display:grid;gap:6px}.record button{width:100%;margin-top:6px}@media(max-width:860px){.wrap{flex-direction:column;align-items:center}.side{width:390px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="status"><span>9:41</span><span>宁波一卡通 APP</span></div>
    <div class="head"><b>宁波纺院学校专区</b><div class="note">H5 框架待补充 · 页面结构参考标书示意图和功能章节</div></div>
    <div class="phone-inner"><main class="screen" id="screen"></main><nav class="tabbar"><button class="tab active" onclick="go('home',this)">首页</button><button class="tab" onclick="go('notice',this)">资讯</button><button class="tab" onclick="go('book',this)">服务</button><button class="tab" onclick="go('mine',this)">我的</button></nav></div>
  </div>
  <aside class="side">
    <h3>H5 原型需求覆盖</h3>
    <p class="muted">每个功能点都有独立页面或流程；页面内包含字段、操作、状态/异常提示。素材参考 `docs/tenders/assets/纺院标书技术部分/media` 中移动端示意图。</p>
    <div class="navlist" id="nav"></div>
    <h3>覆盖矩阵</h3>
    <table class="matrix" id="matrix"></table>
  </aside>
</div>
<script>
const pages={
home:{id:'H5-001 / T0R12',title:'首页设计',html:`<div class="banner">首页 banner / 校园资讯 / 通知公告 / 特色应用场景</div><div class="card"><div class="grid"><div class="icon" onclick="go('intro')"><b>校</b>学校简介</div><div class="icon" onclick="go('major')"><b>专</b>专业介绍</div><div class="icon" onclick="go('map')"><b>图</b>校园地图</div><div class="icon" onclick="go('admission')"><b>招</b>招生咨询</div><div class="icon" onclick="go('notice')"><b>告</b>通知公告</div><div class="icon" onclick="go('article')"><b>讯</b>校园资讯</div><div class="icon" onclick="go('visitor')"><b>访</b>访客预约</div><div class="icon" onclick="go('sailing')"><b>启</b>校园启航</div></div></div><div class="card"><b>异常态</b><p class="muted">banner 无数据时展示默认图；内容接口失败时展示重试入口。</p></div>`},
intro:{id:'H5-002 / T0R13',title:'学校简介',html:`<div class="card"><b>学校简介</b><p>图文展示历史沿革、办学理念、发展目标、师资力量、科研成果。</p><div class="banner">学校概况示意图位置</div><button class="btn secondary" onclick="go('home')">返回首页</button></div>`},
major:{id:'H5-003 / T0R14',title:'专业介绍',html:`<div class="card"><b>专业介绍</b><input class="field" placeholder="搜索专业名称 / 代码 / 分院"><div class="item">软件技术<div class="muted">代码 510203 · 信息学院 · 查看详情</div></div><div class="item">服装设计<div class="muted">纺织学院 · 介绍内容由后管维护或中台同步</div></div><div class="card risk">待确认：是否支持专业筛选和数据来源。</div></div>`},
map:{id:'H5-004 / T0R15',title:'校园地图',html:`<div class="card"><b>校园地图</b><div class="banner">校园地图图片，可缩放查看</div><button class="btn secondary">放大查看</button><p class="muted">仅图片地图；如需 GIS 导航需另行确认。</p></div>`},
admission:{id:'H5-005 / T0R16',title:'招生咨询',html:`<div class="card"><b>招生咨询</b><div class="item">招生热线：0574-00000000 <button class="btn secondary">拨打</button></div><div class="item">传真：0574-00000001</div><div class="item">微信公众号：宁波纺院招生</div><div class="item">咨询说明：展示招生政策和联系方式。</div></div>`},
notice:{id:'H5-006 / T0R17',title:'通知公告',html:`<div class="card"><b>通知公告</b><div class="item" onclick="go('noticeDetail')">校园码试运行通知 <span class="tag">已发布</span><div class="muted">2026-07-08 · 点击查看详情</div></div><div class="item">一卡通服务消息同步说明 <span class="tag">已发布</span></div><div class="card risk">未审核、下架、过期公告不可见；接口失败展示重试。</div></div>`},
noticeDetail:{id:'H5-006-D',title:'公告详情',html:`<div class="card"><b>公告详情</b><p>公告正文，支持图文内容。来源于学校端公告管理。</p><button class="btn secondary" onclick="go('notice')">返回公告列表</button></div>`},
article:{id:'H5-007 / T0R18',title:'校园资讯',html:`<div class="card"><b>校园资讯</b><div class="item">新生社保卡办理指南 <span class="tag warn">推荐到首页/banner</span><div class="muted">发布人、展示模式、审核状态、推荐状态、发布时间</div></div><div class="item">图书馆暑期开放安排</div></div>`},
visitor:{id:'H5-008',title:'访客预约',html:`<div class="card"><b>访客预约</b><input class="field" placeholder="姓名"><input class="field" placeholder="身份证号"><input class="field" placeholder="手机号"><input class="field" placeholder="访问时间"><input class="field" placeholder="通行方式"><input class="field" placeholder="车牌"><input class="field" placeholder="拜访人"><input class="field" placeholder="访问缘由"><button class="btn" onclick="go('visitorResult')">提交审核</button><p class="muted">社保卡/码入校，需对接访客预约系统。</p></div>`},
visitorResult:{id:'H5-008-R',title:'预约记录',html:`<div class="card"><b>预约记录</b><div class="item">张访客 · 信息学院 <span class="tag warn">待审核</span></div><div class="item">李访客 · 纺织学院 <span class="tag">已通过</span></div><div class="item">王访客 · 行政楼 <span class="tag bad">未通过</span></div></div>`},
sailing:{id:'H5-009 / T0R19',title:'校园启航',html:`<div class="card"><b>校园账号激活</b><input class="field" placeholder="姓名"><input class="field" placeholder="身份证号"><input class="field" placeholder="录取号/学号"><button class="btn">身份认证并绑定社保卡</button></div><div class="card"><b>社保卡办理</b><input class="field" placeholder="手机号"><input class="field" placeholder="办卡预约网点/时间"><button class="btn secondary">提交办卡预约</button></div><div class="card risk">高风险：身份核验、绑卡、金融账户激活状态以后端可信结果为准。</div>`},
book:{id:'H5-010 / T0R20',title:'图书借阅',html:`<div class="card"><b>图书检索</b><input class="field" placeholder="书名 / 著者 / 出版社 / 借阅状态"><div class="item">Python 编程基础<div class="muted">著者 A · 出版社 B · 图书编号 B001 · 馆藏地 三楼 · 可借</div></div></div><div class="card"><b>新书推荐</b><div class="item">服装设计史 · 可借</div></div><div class="card"><b>借阅排行</b><div class="item">Top1 Python 编程基础</div></div>`},
mine:{id:'H5-011 / T0R21',title:'我的',html:`<div class="card"><b>个人中心</b><div class="item">个人资料 <span class="tag">已认证</span></div><div class="item" onclick="go('visitorResult')">访客预约记录</div><div class="item" onclick="go('consume')">消费记录</div><div class="item" onclick="go('bookRecords')">图书借阅记录</div><div class="item" onclick="go('access')">门禁记录</div><div class="item">校园卡账本</div><div class="item">社保卡信息 <span class="tag">已绑卡</span></div><div class="item">校园码 <span class="tag warn">动态码</span></div></div><div class="card risk">本人数据隔离；校园码需有效期、防截屏/防重放策略待技术确认。</div>`},
consume:{id:'H5-011-C',title:'消费记录',html:`<div class="card"><b>消费记录</b><div class="item">一食堂 · 12.50 元<div class="muted">流水 PAY202607080001 · 社保码 · 2026-07-08</div></div></div>`},
access:{id:'H5-011-A',title:'门禁记录',html:`<div class="card"><b>门禁记录</b><div class="item">南门 · 社保码 · 入校 · 成功<div class="muted">2026-07-08 08:10</div></div></div>`},
bookRecords:{id:'H5-011-B',title:'图书借阅记录',html:`<div class="card"><b>图书借阅记录</b><div class="item">Python 编程基础<div class="muted">借阅 2026-07-01 · 应还 2026-08-01 · 未归还</div></div></div>`},
message:{id:'H5-012 / T0R22',title:'APP 服务消息',html:`<div class="card"><b>服务消息</b><div class="item">校园通知已同步到宁波一卡通 APP 服务消息。</div><div class="item">消息发送失败 <span class="tag bad">待重试</span></div><p class="muted">需确认消息接口、失败重试、撤回机制。</p></div>`},
wallet:{id:'H5-013 / T0R23',title:'我的卡包',html:`<div class="card"><b>我的卡包</b><div class="item">校园卡 <span class="tag">已绑定</span><div class="muted">卡号 2026****0001 · 宁波纺院</div></div><button class="btn secondary">解绑/重新绑定</button><p class="muted">绑定凭证、解绑规则和卡状态同步待确认。</p></div>`},
coverage:{id:'MATRIX',title:'覆盖矩阵',html:`<div class="card"><b>H5 原型覆盖矩阵</b><table class="matrix"><tr><th>编号</th><th>功能</th><th>页面</th><th>状态</th></tr>${''}</table></div>`}
};
const order=['home','intro','major','map','admission','notice','article','visitor','sailing','book','mine','message','wallet','coverage'];
const matrixRows=[
['H5-001/T0R12','首页设计','home','已覆盖'],['H5-002/T0R13','学校简介','intro','已覆盖'],['H5-003/T0R14','专业介绍','major','已覆盖'],['H5-004/T0R15','校园地图','map','已覆盖'],['H5-005/T0R16','招生咨询','admission','已覆盖'],['H5-006/T0R17','通知公告','notice + noticeDetail','已覆盖'],['H5-007/T0R18','校园资讯','article','已覆盖'],['H5-008','访客预约/预约记录','visitor + visitorResult','已覆盖'],['H5-009/T0R19','校园启航：账号激活、社保卡办理','sailing','已覆盖'],['H5-010/T0R20','图书借阅：新书、检索、排行','book','已覆盖'],['H5-011/T0R21','我的：资料、访客、消费、图书、门禁、账本、社保卡、校园码','mine + consume/access/bookRecords','已覆盖'],['H5-012/T0R22','APP 服务消息','message','已覆盖'],['H5-013/T0R23','APP 我的卡包','wallet','已覆盖']];
function go(id,btn){const p=pages[id];document.getElementById('screen').innerHTML=`<section class="page active"><div class="card"><b>${p.title}</b><div class="muted">${p.id}</div></div>${id==='coverage'?coverageHtml():p.html}</section>`;document.querySelectorAll('.navlist button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));if(btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active')}}
function coverageHtml(){return `<div class="card"><table class="matrix"><tr><th>需求编号</th><th>功能点</th><th>对应页面/流程</th><th>覆盖</th></tr>${matrixRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></div>`}
document.getElementById('nav').innerHTML=order.map(id=>`<button data-id="${id}" onclick="go('${id}')">${pages[id].title}<br><span class="muted">${pages[id].id}</span></button>`).join('');
document.getElementById('matrix').innerHTML=`<tr><th>编号</th><th>功能</th><th>页面</th><th>覆盖</th></tr>${matrixRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}`;
go('home');
</script>
</body>
</html>
