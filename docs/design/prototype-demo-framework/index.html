<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snowy 后管原型 Demo 框架</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ant-design-vue@4.2.6/dist/reset.css" />
  <style>
    :root {
      --sidebar: #001529;
      --sidebar-soft: #031f3a;
      --brand: #1677ff;
      --page: #f5f7fb;
      --line: #edf0f5;
      --text-soft: #667085;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    #app { min-height: 100vh; }
    .app-shell { min-height: 100vh; }
    .brand {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      color: #fff;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }
    .snowy-sider {
      background: var(--sidebar) !important;
      box-shadow: 2px 0 10px rgba(15, 23, 42, .08);
    }
    .snowy-sider .ant-menu {
      background: var(--sidebar);
      color: rgba(255,255,255,.76);
      border-inline-end: 0;
    }
    .snowy-sider .ant-menu-submenu-title,
    .snowy-sider .ant-menu-item { border-radius: 0; margin-inline: 0; width: 100%; }
    .snowy-sider .ant-menu-item-selected {
      background: #0b3a72 !important;
      color: #fff;
      border-left: 3px solid var(--brand);
    }
    .snowy-header {
      height: 56px;
      padding: 0 18px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left, .header-right { display: flex; align-items: center; gap: 14px; }
    .icon-action {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #475467;
      cursor: pointer;
    }
    .icon-action:hover { background: #f2f4f7; color: var(--brand); }
    .mini-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      min-width: 1em;
      font-weight: 700;
      line-height: 1;
    }
    .tabs-row {
      height: 44px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 8px;
    }
    .content {
      padding: 16px;
      overflow: auto;
    }
    .query-card,
    .table-card,
    .tree-card {
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 4px;
    }
    .query-card { padding: 16px 16px 12px; margin-bottom: 14px; }
    .table-card { padding: 16px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .toolbar-left,
    .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cover {
      width: 92px;
      height: 46px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #d9e2ef;
      display: block;
      background: #f3f4f6;
    }
    .cover-empty {
      width: 92px;
      height: 46px;
      border-radius: 4px;
      border: 1px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #98a2b3;
      background: #fafafa;
      font-size: 12px;
    }
    .page-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .muted { color: var(--text-soft); }
    .tree-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 14px;
    }
    .tree-card { padding: 14px; }
    .resource-node {
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .resource-node:hover,
    .resource-node.active { background: #eef5ff; color: var(--brand); }
    .drawer-cover {
      width: 180px;
      height: 90px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .preset-card {
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 4px;
      padding: 14px;
    }
    .preset-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .preset-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      flex-wrap: wrap;
    }
    .text-ellipsis {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }
    .file-thumb {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: #667085;
    }
    .file-thumb.pdf { background: #ef4444; }
    .file-thumb.xls { background: #16a34a; }
    .file-thumb.doc { background: #2563eb; }
    .upload-preview {
      width: 102px;
      height: 102px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: block;
    }
    @media (max-width: 960px) {
      .tree-layout { grid-template-columns: 1fr; }
      .preset-grid { grid-template-columns: 1fr; }
      .snowy-sider { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/advancedFormat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/customParseFormat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/localeData.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/quarterOfYear.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/weekday.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/weekOfYear.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.19/plugin/weekYear.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ant-design-vue@4.2.6/dist/antd.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed, h } = Vue;
    const prototypeMeta = {
      systemName: '示例管理系统',
      logoText: '示',
      logoImage: ''
    };

    const demoImages = [
      'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="184" height="92"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#1677ff"/><stop offset="1" stop-color="#69b1ff"/></linearGradient></defs><rect width="184" height="92" rx="8" fill="url(#g)"/><circle cx="142" cy="34" r="20" fill="rgba(255,255,255,.35)"/><path d="M20 64l30-28 24 22 18-15 36 31H20z" fill="rgba(255,255,255,.8)"/></svg>'),
      'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="184" height="92"><rect width="184" height="92" rx="8" fill="#12b76a"/><rect x="18" y="18" width="86" height="12" rx="6" fill="rgba(255,255,255,.75)"/><rect x="18" y="42" width="132" height="8" rx="4" fill="rgba(255,255,255,.45)"/><rect x="18" y="58" width="104" height="8" rx="4" fill="rgba(255,255,255,.45)"/></svg>'),
      ''
    ];

    const seedRows = [
      { id: 1, title: '校园资讯首页 Banner', cover: demoImages[0], category: '首页 Banner', position: '后台首页', sort: 10, status: true, audit: '已发布', createdAt: '2026-07-08 09:30', summary: '展示校园资讯和重点通知。' },
      { id: 2, title: '暑期校园开放通知', cover: '', category: '通知公告', position: '学校专区', sort: 20, status: false, audit: '已下架', createdAt: '2026-07-07 16:12', summary: '假期开放安排和入校说明。' },
      { id: 3, title: '专业介绍更新', cover: demoImages[1], category: '专业介绍', position: '后台首页', sort: 30, status: true, audit: '待审核', createdAt: '2026-07-06 11:05', summary: '专业介绍内容更新入口。' },
      { id: 4, title: '招生咨询入口', cover: demoImages[0], category: '招生服务', position: '学校专区', sort: 40, status: true, audit: '已发布', createdAt: '2026-07-05 14:20', summary: '招生咨询和访客预约入口。' }
    ];
    const userAvatar = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" rx="40" fill="#1677ff"/><circle cx="40" cy="31" r="14" fill="white" opacity=".9"/><path d="M18 68c4-15 39-15 44 0" fill="white" opacity=".9"/></svg>');
    const componentRows = [
      { id: 'u1', avatar: userAvatar, account: 'admin', name: '系统管理员', gender: '男', phone: '13800000001', org: '信息中心', role: '管理员', status: true, progress: 92, engine: '本地存储', fileType: 'pdf', fileName: '校园专区方案.pdf', size: '2.4 MB', remark: '拥有完整管理权限，可维护菜单、角色与内容。' },
      { id: 'u2', avatar: '', account: 'operator', name: '运营人员', gender: '女', phone: '13800000002', org: '招生办公室', role: '运营人员', status: true, progress: 68, engine: '对象存储', fileType: 'xls', fileName: '访客预约导入模板.xlsx', size: '520 KB', remark: '负责内容发布、招生咨询和访客预约审核。' },
      { id: 'u3', avatar: userAvatar, account: 'auditor', name: '审核人员', gender: '男', phone: '13800000003', org: '教务处', role: '审核人员', status: false, progress: 35, engine: '本地存储', fileType: 'doc', fileName: '通知公告审核记录.docx', size: '890 KB', remark: '负责公告审核、数据复核和发布状态确认。' }
    ];

    const app = createApp({
      setup() {
        const collapsed = ref(false);
        const currentPage = ref('banner');
        const activeTab = ref('首页 Banner');
        const selectedKeys = ref(['banner']);
        const openKeys = ref(['business', 'content', 'student', 'system']);
        const tableSize = ref('middle');
        const selectedRowKeys = ref([]);
        const rows = ref(seedRows.map(item => ({ ...item })));
        const query = reactive({ keyword: '', category: undefined, status: undefined, dateRange: [] });
        const advanced = ref(false);
        const drawerOpen = ref(false);
        const drawerMode = ref('add');
        const formState = reactive({ id: null, title: '', category: '首页 Banner', position: '后台首页', sort: 10, status: true, audit: '待审核', cover: demoImages[0], summary: '', uploadFiles: [{ uid: 'init', name: '示例封面.png', status: 'done', url: demoImages[0] }] });
        const detailRecord = ref(null);
        const importOpen = ref(false);
        const columnOpen = ref(false);
        const previewOpen = ref(false);
        const previewImage = ref('');
        const previewTitle = ref('');
        const menuDrawerOpen = ref(false);
        const menuForm = reactive({ parent: '内容管理', name: '首页 Banner', path: '/content/banner', permissionName: '首页 Banner 管理', visible: true, sort: 20 });
        const activeResource = ref('首页 Banner');
        const checkedColumns = ref(['title', 'cover', 'category', 'position', 'sort', 'audit', 'status', 'action']);
        const pagination = reactive({ current: 1, pageSize: 10 });

        const menuItems = [
          { key: 'business', label: '业务运营', children: [
            { key: 'content', label: '内容管理', children: [
              { key: 'banner', label: '首页 Banner' },
              { key: 'notice', label: '通知公告', children: [
                { key: 'noticeList', label: '公告列表' },
                { key: 'noticeAudit', label: '发布审核' }
              ] }
            ] },
            { key: 'student', label: '师生管理', children: [
              { key: 'students', label: '学生管理' },
              { key: 'teachers', label: '教职工管理' },
              { key: 'historyStudents', label: '历史学生管理' }
            ] }
          ] },
          { key: 'system', label: '系统能力', children: [
            { key: 'resources', label: '资源权限', children: [
              { key: 'menuResource', label: '菜单资源' },
              { key: 'operationPermission', label: '操作权限' },
              { key: 'roleGrant', label: '角色授权' },
              { key: 'components', label: '组件预设' }
            ] }
          ] }
        ];

        const baseColumns = [
          { title: '标题', dataIndex: 'title', key: 'title', width: 190 },
          { title: '封面图', dataIndex: 'cover', key: 'cover', width: 116 },
          { title: '栏目', dataIndex: 'category', key: 'category', width: 110 },
          { title: '发布位置', dataIndex: 'position', key: 'position', width: 110 },
          { title: '排序', dataIndex: 'sort', key: 'sort', width: 70, sorter: (a, b) => a.sort - b.sort },
          { title: '发布状态', dataIndex: 'audit', key: 'audit', width: 100 },
          { title: '启停', dataIndex: 'status', key: 'status', width: 90 },
          { title: '创建时间', dataIndex: 'createdAt', key: 'createdAt', width: 172 },
          { title: '操作', key: 'action', fixed: 'right', width: 170 }
        ];
        const columns = computed(() => baseColumns.filter(col => checkedColumns.value.includes(col.key)));
        const componentColumns = [
          { title: '头像', dataIndex: 'avatar', key: 'avatar', width: 78, align: 'center' },
          { title: '账号', dataIndex: 'account', key: 'account', width: 110 },
          { title: '姓名', dataIndex: 'name', key: 'name', width: 110 },
          { title: '性别', dataIndex: 'gender', key: 'gender', width: 90 },
          { title: '机构', dataIndex: 'org', key: 'org', width: 130 },
          { title: '角色', dataIndex: 'role', key: 'role', width: 120 },
          { title: '状态', dataIndex: 'status', key: 'status', width: 120 },
          { title: '完成度', dataIndex: 'progress', key: 'progress', width: 150 },
          { title: '文件', dataIndex: 'fileName', key: 'fileName', width: 230 },
          { title: '备注', dataIndex: 'remark', key: 'remark', width: 260 },
          { title: '操作', key: 'action', fixed: 'right', width: 170 }
        ];

        const filteredRows = computed(() => {
          let result = rows.value.slice();
          if (query.keyword) result = result.filter(row => row.title.includes(query.keyword.trim()));
          if (query.category) result = result.filter(row => row.category === query.category);
          if (query.status !== undefined) result = result.filter(row => row.status === query.status);
          if (query.dateRange && query.dateRange.length === 2) {
            const start = dayjs(query.dateRange[0]).startOf('day');
            const end = dayjs(query.dateRange[1]).endOf('day');
            result = result.filter(row => dayjs(row.createdAt).isAfter(start) && dayjs(row.createdAt).isBefore(end));
          }
          return result;
        });

        const pageTitle = computed(() => currentPage.value === 'menuResource' ? '菜单资源' : activeTab.value);
        const rowSelection = computed(() => ({
          selectedRowKeys: selectedRowKeys.value,
          onChange: keys => selectedRowKeys.value = keys
        }));

        const showMessage = (type, text) => antd.message[type](text);
        const setPage = ({ key }) => {
          selectedKeys.value = [key];
          const names = {
            banner: '首页 Banner',
            noticeList: '公告列表',
            noticeAudit: '发布审核',
            students: '学生管理',
            teachers: '教职工管理',
            historyStudents: '历史学生管理',
            menuResource: '菜单资源',
            operationPermission: '操作权限',
            roleGrant: '角色授权',
            components: '组件预设'
          };
          activeTab.value = names[key] || '首页 Banner';
          currentPage.value = key === 'menuResource' ? 'menuResource' : key === 'components' ? 'components' : 'banner';
          showMessage('success', '已切换到' + activeTab.value);
        };
        const onOpenChange = keys => openKeys.value = keys;
        const search = () => {
          pagination.current = 1;
          showMessage('success', '查询完成');
        };
        const reset = () => {
          query.keyword = '';
          query.category = undefined;
          query.status = undefined;
          query.dateRange = [];
          pagination.current = 1;
          showMessage('success', '查询条件已重置');
        };
        const refresh = () => showMessage('success', '列表已刷新');
        const exportData = () => showMessage('success', '导出任务已创建');
        const batchDelete = () => {
          if (!selectedRowKeys.value.length) {
            showMessage('warning', '请先选择需要删除的数据');
            return;
          }
          antd.Modal.confirm({
            title: '删除确认',
            content: '确定要删除选中的数据吗？删除后列表将自动刷新。',
            okText: '确定',
            cancelText: '取消',
            onOk() {
              rows.value = rows.value.filter(row => !selectedRowKeys.value.includes(row.id));
              selectedRowKeys.value = [];
              showMessage('success', '删除成功');
            }
          });
        };
        const removeRow = record => {
          antd.Modal.confirm({
            title: '删除确认',
            content: '确定要删除“' + record.title + '”吗？',
            okText: '确定',
            cancelText: '取消',
            onOk() {
              rows.value = rows.value.filter(row => row.id !== record.id);
              selectedRowKeys.value = selectedRowKeys.value.filter(id => id !== record.id);
              showMessage('success', '删除成功');
            }
          });
        };
        const openAdd = () => {
          drawerMode.value = 'add';
          Object.assign(formState, { id: null, title: '', category: '首页 Banner', position: '后台首页', sort: 10, status: true, audit: '待审核', cover: demoImages[0], summary: '', uploadFiles: demoImages[0] ? [{ uid: 'demo-1', name: '示例封面.png', status: 'done', url: demoImages[0] }] : [] });
          drawerOpen.value = true;
        };
        const openEdit = record => {
          drawerMode.value = 'edit';
          Object.assign(formState, { ...record, uploadFiles: record.cover ? [{ uid: String(record.id), name: record.title + '.png', status: 'done', url: record.cover }] : [] });
          drawerOpen.value = true;
        };
        const openDetail = record => {
          detailRecord.value = { ...record };
          drawerMode.value = 'detail';
          Object.assign(formState, { ...record, uploadFiles: record.cover ? [{ uid: String(record.id), name: record.title + '.png', status: 'done', url: record.cover }] : [] });
          drawerOpen.value = true;
        };
        const saveForm = () => {
          if (!formState.title.trim()) {
            showMessage('warning', '请输入标题');
            return;
          }
          if (drawerMode.value === 'edit') {
            rows.value = rows.value.map(row => row.id === formState.id ? { ...row, ...formState } : row);
          } else {
            rows.value.unshift({ ...formState, id: Date.now(), createdAt: dayjs().format('YYYY-MM-DD HH:mm'), audit: '待审核' });
          }
          drawerOpen.value = false;
          showMessage('success', '保存成功，列表已刷新');
        };
        const auditRow = record => {
          record.audit = '已发布';
          record.status = true;
          showMessage('success', '审核通过');
        };
        const toggleStatus = (record, value) => {
          record.status = value;
          record.audit = value ? '已发布' : '已下架';
          showMessage('success', value ? '已启用' : '已停用');
        };
        const useExampleCover = () => {
          formState.cover = formState.cover === demoImages[0] ? demoImages[1] : demoImages[0];
          formState.uploadFiles = formState.cover ? [{ uid: 'example', name: '示例封面.png', status: 'done', url: formState.cover }] : [];
          showMessage('success', '封面图已更新');
        };
        const beforeCoverUpload = file => {
          if (!file.type || !file.type.startsWith('image/')) {
            showMessage('warning', '请选择图片文件');
            return false;
          }
          const reader = new FileReader();
          reader.onload = event => {
            const dataUrl = event.target.result;
            formState.cover = dataUrl;
            formState.uploadFiles = [{ uid: file.uid || String(Date.now()), name: file.name, status: 'done', url: dataUrl }];
            showMessage('success', '图片已选择');
          };
          reader.readAsDataURL(file);
          return false;
        };
        const removeCover = () => {
          formState.cover = '';
          formState.uploadFiles = [];
          showMessage('success', '封面图已移除');
          return true;
        };
        const previewCover = file => {
          previewImage.value = file.url || formState.cover;
          previewTitle.value = file.name || '图片预览';
          previewOpen.value = true;
        };
        const previewCurrentCover = () => {
          if (!formState.cover) {
            showMessage('warning', '暂无图片可预览');
            return;
          }
          previewImage.value = formState.cover;
          previewTitle.value = formState.title || '图片预览';
          previewOpen.value = true;
        };
        const saveImport = () => {
          importOpen.value = false;
          showMessage('success', '导入完成，列表已刷新');
        };
        const saveMenu = () => {
          menuDrawerOpen.value = false;
          showMessage('success', '菜单已保存');
        };
        const setResource = name => {
          activeResource.value = name;
          showMessage('success', '已选择' + name);
        };
        const changePage = page => {
          pagination.current = page.current;
