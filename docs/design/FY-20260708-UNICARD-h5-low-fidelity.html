<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>宁波市高校一卡通 APP 学校专区低保真原型</title><style>body{margin:0;background:#f4f6fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#1f2937}.phone{width:390px;max-width:100%;min-height:780px;margin:18px auto;background:#fff;border:1px solid #d9e2ef;border-radius:24px;overflow:hidden;box-shadow:0 12px 30px rgba(15,23,42,.12)}.top{background:#1677ff;color:#fff;padding:18px 18px 16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px}.item{border:1px solid #e5e7eb;border-radius:10px;padding:10px 6px;text-align:center;background:#fff;cursor:pointer}.item.active{border-color:#1677ff;background:#eef5ff;color:#1677ff}.screen{padding:14px}.banner{height:120px;border-radius:12px;background:linear-gradient(135deg,#1677ff,#69b1ff);color:#fff;padding:16px;margin-bottom:12px}.card{border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin:10px 0;background:#fff}.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}.tag{display:inline-block;border-radius:999px;background:#eef5ff;color:#1677ff;padding:2px 8px;font-size:12px}.bottom{position:sticky;bottom:0;background:#fff;border-top:1px solid #e5e7eb;display:grid;grid-template-columns:repeat(4,1fr);text-align:center}.bottom button{border:0;background:#fff;padding:10px 0;color:#475467}.btn{width:100%;border:0;background:#1677ff;color:#fff;border-radius:8px;padding:10px;margin-top:8px}</style></head><body><div class="phone"><div class="top"><div style="font-size:13px;opacity:.85">H5 框架待补充</div><h2 style="margin:6px 0 0">宁波市高校一卡通学校专区</h2></div><div class="banner"><b>未来校园专区</b><p>校园卡与社会保障码/卡融合服务入口</p></div><div class="grid"><div class="item active" onclick="show('H5-001')"><div>首页设计</div><small>H5-001</small></div><div class="item" onclick="show('H5-002')"><div>学校简介</div><small>H5-002</small></div><div class="item" onclick="show('H5-003')"><div>专业介绍</div><small>H5-003</small></div><div class="item" onclick="show('H5-004')"><div>校园地图</div><small>H5-004</small></div><div class="item" onclick="show('H5-005')"><div>招生咨询</div><small>H5-005</small></div><div class="item" onclick="show('H5-006')"><div>通知公告</div><small>H5-006</small></div><div class="item" onclick="show('H5-007')"><div>校园资讯</div><small>H5-007</small></div><div class="item" onclick="show('H5-008')"><div>访客预约</div><small>H5-008</small></div><div class="item" onclick="show('H5-009')"><div>校园启航</div><small>H5-009</small></div><div class="item" onclick="show('H5-010')"><div>图书借阅</div><small>H5-010</small></div><div class="item" onclick="show('H5-011')"><div>我的</div><small>H5-011</small></div><div class="item" onclick="show('H5-012')"><div>服务消息对接</div><small>H5-012</small></div><div class="item" onclick="show('H5-013')"><div>我的卡包对接</div><small>H5-013</small></div></div><div class="screen" id="screen"></div><div class="bottom"><button onclick="show('H5-001')">首页</button><button onclick="show('H5-008')">预约</button><button onclick="show('H5-010')">图书</button><button onclick="show('H5-011')">我的</button></div></div><script>const pages=[{"id":"H5-001","name":"首页设计","display":["校园资讯","通知公告","特色应用场景","首页 banner"],"ops":["查看","跳转"],"excerpt":"在“一卡通”APP端建设未来校园专区；首页按预设布局展示校园资讯、通知公告、特色应用场景。"},{"id":"H5-002","name":"学校简介","display":["历史沿革","办学理念","发展目标","师资力量","科研成果"],"ops":["查看"],"excerpt":"通过图文方式介绍学校历史沿革、办学理念、发展目标、师资力量、科研成果。"},{"id":"H5-003","name":"专业介绍","display":["专业代码","专业名称","所属分院"],"ops":["查看"],"excerpt":"介绍专业设置，包括专业代码、专业名称、所属分院。"},{"id":"H5-004","name":"校园地图","display":["校园地图图片","场所分布"],"ops":["查看","缩放"],"excerpt":"以图片形式呈现校园地图，便于师生和访客查看校园内部场所分布。"},{"id":"H5-005","name":"招生咨询","display":["招生热线","传真","微信公众号"],"ops":["查看","拨号","复制"],"excerpt":"展示学校招生热线、传真、微信公众号。"},{"id":"H5-006","name":"通知公告","display":["公告标题","公告摘要","发布时间"],"ops":["查看清单","查看详情","查看"],"excerpt":"提供校园通知公告模块，支持查看公告清单和详情。"},{"id":"H5-007","name":"校园资讯","display":["资讯标题","资讯封面"],"ops":["查看清单","查看详情","查看"],"excerpt":"用户可在校园资讯板块查看所有资讯清单及详细内容，单条资讯可在专区首页 banner 位展现。"},{"id":"H5-008","name":"访客预约","display":["姓名","身份证号","手机号","访问时间","通行方式","车牌","拜访人","访问缘由"],"ops":["提交预约","查看"],"excerpt":"访客输入姓名、身份证号、手机号、访问时间、通行方式、车牌、拜访人、访问缘由、备注并提交审核；支持查看已通过、待审核、未通过预约记录。"},{"id":"H5-009","name":"校园启航","display":["校园账号激活状态","社保卡绑定状态","身份核验结果","预约办卡状态"],"ops":["校园账号激活","社保卡绑定","预约办卡","查看"],"excerpt":"新生线上校园账号激活、社保卡办理；绑定社保卡后与招生录取数据源比对验证；无本省社保卡用户可线上预约办卡。"},{"id":"H5-010","name":"图书借阅","display":["书名","著者","出版社","出版时间","书籍封面图片","图书编号","书籍借阅状态","馆场地"],"ops":["图书检索","查看"],"excerpt":"对接图书馆系统，提供新书推荐、图书检索、借阅排行；展示书名、著者、出版社、出版时间、封面图片、图书编号、书籍借阅状态、馆场地。"},{"id":"H5-011","name":"我的","display":["个人资料","访客预约记录","消费记录","图书借阅记录","门禁记录","校园卡账本","社保卡信息","校园码"],"ops":["查看","跳转记录详情"],"excerpt":"集中展示个人资料、访客预约记录、消费记录、图书借阅记录、门禁记录、校园卡账本、社保卡信息、校园码。"},{"id":"H5-012","name":"服务消息对接","display":["消息标题","消息内容","通知时间"],"ops":["消息推送","查看消息","查看"],"excerpt":"对接宁波一卡通APP服务消息，实现校园通知信息集中展示通知和查看。"},{"id":"H5-013","name":"我的卡包对接","display":["校园卡信息"],"ops":["绑定校园卡","查看校园卡","查看"],"excerpt":"对接宁波一卡通APP我的卡包，实现校园卡信息绑定并在一卡通“我的卡包”查看和展示。"}];function show(id){const p=pages.find(x=>x.id===id)||pages[0];document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));const btn=[...document.querySelectorAll('.item')].find(x=>x.innerText.includes(id));if(btn)btn.classList.add('active');document.getElementById('screen').innerHTML='<h3>'+p.name+'</h3><p>'+p.excerpt+'</p>'+p.display.map(x=>'<div class="row"><span>'+x+'</span><span class="tag">示例</span></div>').join('')+'<button class="btn" onclick="alert(\'已完成 '+p.name+' 操作\')">'+(p.ops[0]||'查看')+'</button><div class="card"><b>原型需求覆盖</b><p>'+p.id+' 已覆盖页面入口、字段、状态和主操作。</p></div>'}show('H5-001')</script></body></html>
