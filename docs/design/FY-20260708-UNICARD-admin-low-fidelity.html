ops.some(x=>x.includes('审核'))" @click="doAction('审核')">审核</a-button><a-button v-if="activePage.ops.some(x=>x.includes('授权'))" @click="doAction('授权')">授权</a-button></div><div class="toolbar-right"><a-tooltip title="刷新"><a-button shape="circle" @click="search"><span class="mini-icon">↻</span></a-button></a-tooltip><a-tooltip title="列设置"><a-button shape="circle" @click="modalOpen=true"><span class="mini-icon">☷</span></a-button></a-tooltip></div></div><a-table row-key="id" :columns="columns" :data-source="rows" :row-selection="rowSelection" :pagination="{pageSize:5,total:rows.length,showTotal:t=>'共 '+t+' 条'}" :scroll="{x:1200}"><template #bodyCell="{column,record}"><template v-if="activePage.sensitive.includes(column.key)"><span>{{String(record[column.key]).replace(/(.{2}).*(.{2})/,'$1****$2')}}</span></template><template v-else-if="/(图片|图标|banner)/.test(column.key)"><img v-if="record[column.key]" class="cover" :src="record[column.key]"/><div v-else class="cover-empty">无图</div></template><template v-else-if="/(状态|结果|类型|身份|角色|权限|方向|方式)/.test(column.key)||column.key==='__state'"><a-tag :color="String(record[column.key]).includes('异常')?'red':String(record[column.key]).includes('待')?'orange':'green'">{{record[column.key]}}</a-tag></template><template v-else-if="/金额/.test(column.key)"><div style="text-align:right">{{record[column.key]}}</div></template><template v-else-if="column.key==='action'"><a-space><a @click="doAction('详情',record)">详情</a><a v-if="activePage.ops.some(x=>x.includes('编辑'))" @click="doAction('编辑',record)">编辑</a><a v-if="activePage.ops.some(x=>x.includes('删除'))" @click="doAction('删除',record)">删除</a><a v-if="activePage.ops.some(x=>x.includes('远程'))" @click="doAction('远程配置',record)">远程配置</a></a-space></template></template></a-table></div><div class="table-card coverage"><h2 class="page-title">原型需求覆盖矩阵</h2><a-table size="small" :pagination="{pageSize:8}" :data-source="catalog" :columns="[{title:'需求编号',dataIndex:'id'},{title:'功能点',dataIndex:'name'},{title:'页面/弹窗/抽屉',dataIndex:'menu'},{title:'蓝图条目',dataIndex:'route'},{title:'字段',dataIndex:'cols'},{title:'操作',dataIndex:'ops'},{title:'状态/异常',dataIndex:'states'},{title:'权限',dataIndex:'role'},{title:'覆盖状态',dataIndex:'status'}]" row-key="id"><template #bodyCell="{column,record}"><template v-if="column.dataIndex==='status'"><a-tag color="green">已覆盖</a-tag></template><template v-else-if="Array.isArray(record[column.dataIndex])">{{record[column.dataIndex].join('、')}}</template></template></a-table></div></a-layout-content></a-layout><a-drawer :title="drawerMode==='detail'?'详情':'表单'" width="640" v-model:open="drawerOpen"><a-descriptions bordered :column="1" size="small" v-if="drawerMode==='detail'"><a-descriptions-item v-for="f in activePage.details" :key="f" :label="f">{{detailRecord[f]||f+'示例'}}</a-descriptions-item></a-descriptions><a-form v-else layout="vertical"><a-form-item v-for="f in (activePage.forms.length?activePage.forms:activePage.details.slice(0,6))" :key="f" :label="f" required><a-upload v-if="/(图片|图标|banner|文件)/.test(f)" list-type="picture-card"><div><div>＋</div><div>选择图片</div></div></a-upload><a-select v-else-if="/(状态|角色|权限|范围|身份|类型)/.test(f)" v-model:value="formState[f]"><a-select-option value="启用">启用</a-select-option><a-select-option value="停用">停用</a-select-option><a-select-option value="待审核">待审核</a-select-option></a-select><a-textarea v-else-if="/(内容|备注|参数|数据)/.test(f)" v-model:value="formState[f]"/><a-input v-else v-model:value="formState[f]"/></a-form-item></a-form><template #footer><a-space><a-button @click="drawerOpen=false">取消</a-button><a-button v-if="drawerMode!=='detail'" type="primary" @click="save">保存</a-button></a-space></template></a-drawer><a-modal title="操作确认" v-model:open="modalOpen" ok-text="确定" cancel-text="取消" @ok="save"><p>请确认当前操作，系统将记录操作人员、操作时间和操作结果。</p></a-modal><a-modal title="导入数据" v-model:open="uploadOpen" ok-text="开始导入" cancel-text="取消" @ok="save"><a-upload-dragger :before-upload="()=>false" accept=".xlsx,.xls,.csv"><p class="ant-upload-drag-icon"><span class="mini-icon" style="font-size:28px">⇧</span></p><p class="ant-upload-text">点击或拖拽文件到此区域</p></a-upload-dragger></a-modal></a-layout>`}).use(antd).mount('#app');
</script></body></html>
