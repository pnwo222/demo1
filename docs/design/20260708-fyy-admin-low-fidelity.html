<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>纺院后管低保真原型</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;color:#1f2937;background:#eef1f5;font-size:14px}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#142333;color:#dce8ef;padding:14px 0}.brand{font-size:18px;font-weight:700;padding:0 18px 14px}.group{padding:14px 18px 6px;color:#8fb3c2;font-size:12px}.menu button{display:block;width:100%;border:0;background:transparent;color:#dce8ef;text-align:left;padding:9px 18px;cursor:pointer}.menu button.active{background:#1f7a8c;color:#fff}.top{height:56px;background:#fff;border-bottom:1px solid #d8dee9;display:flex;align-items:center;justify-content:space-between;padding:0 18px}.content{padding:16px}.crumb{display:flex;gap:8px;margin-bottom:12px}.crumb span{background:#fff;border:1px solid #d8dee9;border-radius:6px;padding:6px 10px}.panel{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:14px;margin-bottom:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.field{height:34px;border:1px solid #cfd7e3;border-radius:6px;padding:0 10px;background:#fff;min-width:145px}.btn{height:34px;border:1px solid #1f7a8c;background:#1f7a8c;color:#fff;border-radius:6px;padding:0 12px;cursor:pointer}.btn.secondary{background:#fff;color:#1f7a8c}.btn.danger{border-color:#d1495b;background:#d1495b}.btn.warn{border-color:#b54708;background:#b54708}.btn[disabled]{background:#e5e7eb;border-color:#d1d5db;color:#7b8493}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.stat{background:#fff;border:1px solid #d8dee9;border-radius:8px;padding:12px}.num{font-size:22px;font-weight:700;color:#1f7a8c}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff;min-width:920px}.table th,.table td{border-bottom:1px solid #e5e9f0;padding:9px;text-align:left;white-space:nowrap}.table th{background:#f7f9fc}.tag{display:inline-block;border-radius:999px;padding:2px 8px;background:#e7f4f0;color:#16845b;font-size:12px}.tag.warn{background:#fff3e2;color:#b7791f}.tag.bad{background:#ffe8ec;color:#d1495b}.tag.gray{background:#edf0f5;color:#667085}.drawer{position:fixed;right:-520px;top:0;width:500px;height:100vh;background:#fff;box-shadow:-8px 0 22px rgba(15,23,42,.18);transition:.2s;padding:18px;z-index:10;overflow:auto}.drawer.open{right:0}.mask{display:none;position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:9}.mask.open{display:block}.form-row{margin:10px 0}.form-row label{display:block;color:#667085;margin-bottom:4px}.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid #cfd7e3;border-radius:6px;padding:8px}.alert{border:1px solid #f0d08a;background:#fff8e8;color:#875600;border-radius:8px;padding:9px;margin-top:10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{border:1px solid #cfd7e3;background:#fff;border-radius:6px;padding:7px 10px}.tabs button.active{border-color:#1f7a8c;color:#1f7a8c}.hidden{display:none}.matrix td,.matrix th{white-space:normal}.tree{border-left:2px solid #d8dee9;margin:8px 0 0 8px;padding-left:12px}.node{padding:6px 0}
    @media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}.stats{grid-template-columns:1fr 1fr}.drawer{width:92vw}.table{min-width:760px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">Snowy 后管 · 未来校园</div>
    <div class="menu">
      <div class="group">学校端</div>
      <button class="active" data-page="schoolDashboard">高校首页</button>
      <button data-page="teacherStudent">师生管理</button>
      <button data-page="content">内容管理</button>
      <button data-page="cardApply">社保卡申领记录</button>
      <button data-page="device">设备状态监控</button>
      <button data-page="query">信息查询</button>
      <button data-page="schoolUser">用户管理</button>
      <div class="group">管理端</div>
      <button data-page="platformDashboard">系统首页</button>
      <button data-page="org">组织架构</button>
      <button data-page="permission">权限管理</button>
      <button data-page="logs">日志管理</button>
      <button data-page="sync">一卡通后管对接</button>
      <div class="group">接口与 PAM</div>
      <button data-page="api">校园类接口建设</button>
      <button data-page="pam">PAM 人员管理</button>
      <button data-page="coverage">原型覆盖矩阵</button>
    </div>
  </aside>
  <main>
    <div class="top"><b id="title">高校首页</b><span>当前角色：学校管理员 / 平台管理员 / 审计员</span></div>
    <div class="content">
      <div class="crumb"><span>Snowy</span><span id="crumb">未来校园 / 高校首页</span></div>

      <section id="schoolDashboard" class="page">
        <div class="stats"><div class="stat">专区用户<div class="num">18,620</div></div><div class="stat">社保绑卡率<div class="num">76%</div></div><div class="stat">今日通行<div class="num">9,842</div></div><div class="stat">异常设备<div class="num">3</div></div></div>
        <div class="panel toolbar"><input class="field" value="2026-07-01 ~ 2026-07-08"><select class="field"><option>宁波纺院</option></select><button class="btn">查询</button><button class="btn secondary">报表导出</button></div>
        <div class="panel alert">覆盖 ADM-S-001：时间筛选、数据看板、导出。待技术设计确认统计口径和导出权限。</div>
      </section>

      <section id="teacherStudent" class="page hidden">
        <div class="panel tabs"><button class="active" onclick="renderDataset('student',this)">学生管理</button><button onclick="renderDataset('staff',this)">教职工管理</button><button onclick="renderDataset('historyStudent',this)">历史学生管理</button></div>
        <div id="datasetHost"></div>
      </section>

      <section id="content" class="page hidden">
        <div class="panel tabs"><button class="active" onclick="renderDataset('banner',this)">首页 banner</button><button onclick="renderDataset('appOnline',this)">应用上线</button><button onclick="renderDataset('homeModule',this)">首页模块</button><button onclick="renderDataset('notice',this)">公告</button><button onclick="renderDataset('article',this)">文章</button><button onclick="renderDataset('activity',this)">活动</button></div>
        <div id="contentHost"></div>
      </section>

      <section id="cardApply" class="page hidden"><div id="cardApplyHost"></div></section>
      <section id="device" class="page hidden"><div id="deviceHost"></div></section>
      <section id="query" class="page hidden">
        <div class="panel tabs"><button class="active" onclick="renderDataset('visitorRecord',this)">访客记录</button><button onclick="renderDataset('accessRecord',this)">通行记录</button><button onclick="renderDataset('consumeRecord',this)">消费记录</button><button onclick="renderDataset('bookRecord',this)">图书借阅记录</button></div>
        <div id="queryHost"></div>
      </section>
      <section id="schoolUser" class="page hidden"><div id="schoolUserHost"></div></section>

      <section id="platformDashboard" class="page hidden">
        <div class="stats"><div class="stat">接入高校<div class="num">12</div></div><div class="stat">总用户<div class="num">186k</div></div><div class="stat">活跃第一<div class="num">纺院</div></div><div class="stat">接口异常<div class="num">7</div></div></div>
        <div class="panel toolbar"><input class="field" value="2026-07-01 ~ 2026-07-08"><button class="btn">查询</button><button class="btn secondary">导出排行</button></div>
      </section>
      <section id="org" class="page hidden">
        <div class="panel toolbar"><button class="btn" onclick="openDrawer('学校/部门表单','学校名称,上级节点,排序,状态')">新增学校</button><button class="btn secondary">调整层级</button><button class="btn danger">删除</button></div>
        <div class="panel"><b>组织树</b><div class="tree"><div class="node">宁波市高校</div><div class="tree"><div class="node">宁波纺院</div><div class="tree"><div class="node">信息学院</div><div class="node">纺织学院</div></div><div class="node">示例高校 B</div></div></div></div>
      </section>
      <section id="permission" class="page hidden"><div id="permissionHost"></div></section>
      <section id="logs" class="page hidden"><div id="logsHost"></div></section>
      <section id="sync" class="page hidden"><div id="syncHost"></div></section>
      <section id="api" class="page hidden"><div id="apiHost"></div></section>
      <section id="pam" class="page hidden"><div id="pamHost"></div></section>
      <section id="coverage" class="page hidden"><div id="coverageHost"></div></section>
    </div>
  </main>
</div>
<div class="mask" id="mask" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><h3 id="drawerTitle">表单</h3><div id="drawerFields"></div><div class="alert">低保真原型：真实字段、校验、接口和权限以后续技术方案为准。</div><button class="btn" onclick="closeDrawer()">提交</button> <button class="btn secondary" onclick="closeDrawer()">取消</button></aside>
<script>
const datasets={
 student:{host:'datasetHost',title:'学生管理',perm:'fyyStudent',filters:['姓名','身份证号','手机号','学院','专业','班级','学号','注册状态','社保绑卡状态','金融账户激活状态'],cols:['姓名','手机号','学院','专业','班级','学号','注册','绑卡','省内持卡','卡规范','金融账户'],rows:[['张同学','138****2031','信息学院','软件技术','软件2601','20260001','已注册','已绑卡','是','3.0','未激活']]},
 staff:{host:'datasetHost',title:'教职工管理',perm:'fyyStaff',filters:['姓名','身份证号','手机号','入职年份','当前状态','部门','工号','绑卡状态'],cols:['姓名','手机号','部门','工号','入职年份','当前状态','注册','绑卡','金融账户'],rows:[['王老师','139****5520','信息学院','T2026001','2020','在职','已注册','已绑卡','已激活']]},
 historyStudent:{host:'datasetHost',title:'历史学生管理',perm:'fyyHistoryStudent',filters:['姓名','身份证号','手机号','学院','专业','学籍状态'],cols:['姓名','手机号','学院','专业','学籍状态','离校日期'],rows:[['赵同学','137****8812','纺织学院','服装设计','毕业','2026-06-30']]},
 banner:{host:'contentHost',title:'首页 banner 管理',perm:'fyyBanner',filters:['图片标题','是否跳转','展示开始日期','展示结束日期','展示状态'],cols:['标题','图片','是否跳转','展示开始','展示结束','展示状态','优先级','备注'],rows:[['新生校园启航','1000x394','是','2026-08-01','2026-09-30','展示中','1','APP 首页']]},
 appOnline:{host:'contentHost',title:'应用上线管理',perm:'fyyAppOnline',filters:['应用名称','可见身份','可用状态','展示状态'],cols:['应用名称','图标','链接','可见身份','可用状态','展示状态'],rows:[['校园码','图标','/campus-code','学生/教职工','可用','展示']]},
 homeModule:{host:'contentHost',title:'首页模块管理',perm:'fyyHomeModule',filters:['模板','展示状态'],cols:['模块名称','模板','展示图片','跳转链接','展示状态'],rows:[['校园启航','模板一','已上传','/sailing','展示']]},
 notice:{host:'contentHost',title:'公告管理',perm:'fyyNotice',filters:['标题','审核状态','发布时间'],cols:['标题','发布人','审核状态','发布时间','展示状态'],rows:[['校园码试运行通知','管理员','已审核','2026-07-08','展示']]},
 article:{host:'contentHost',title:'文章管理',perm:'fyyArticle',filters:['标题','发布人','审核状态','推荐状态'],cols:['标题','发布人','展示模式','审核状态','推荐状态','发布时间'],rows:[['新生社保卡办理指南','内容管理员','图文','已审核','推荐','2026-07-08']]},
 activity:{host:'contentHost',title:'活动管理',perm:'fyyActivity',filters:['活动名称','可见身份','活动状态'],cols:['活动名称','可见身份','开始时间','结束时间','状态'],rows:[['迎新服务日','新生','2026-08-25','2026-09-10','报名中']]},
 cardApply:{host:'cardApplyHost',title:'社保卡申领记录',perm:'fyySocialCardApply',filters:['姓名','证件号码','手机号','职业','绑卡状态','申领时间'],cols:['姓名','证件类型','证件号码','手机号','职业','参保地','绑卡','申领时间'],rows:[['李同学','身份证','3302********1234','136****1109','学生','宁波','未绑卡','2026-07-08']]},
 device:{host:'deviceHost',title:'设备状态监控',perm:'fyyDeviceMonitor',filters:['设备名称','位置','在线状态','告警状态'],cols:['设备','位置','在线状态','门长开报警','非法时间开门','最后心跳','操作'],rows:[['南门闸机01','南门','在线','无','无','10:31','远程配置'],['图书馆读头03','图书馆','离线','无','无','09:05','查看日志']]},
 visitorRecord:{host:'queryHost',title:'访客记录管理',perm:'fyyVisitorRecord',filters:['被访人','审核状态','预约渠道','拜访日期'],cols:['来访人','来访单位','手机号','被访人','部门','事由','开始','结束','审核状态','渠道'],rows:[['张访客','示例公司','135****3344','王老师','信息学院','交流','07-08','07-08','待审核','APP']]},
 accessRecord:{host:'queryHost',title:'通行记录管理',perm:'fyyAccessRecord',filters:['人员','设备位置','验证方式','通行时间'],cols:['人员','设备位置','验证方式','方向','通行时间','结果'],rows:[['张同学','南门','社保码','入校','2026-07-08 08:10','成功']]},
 consumeRecord:{host:'queryHost',title:'消费记录管理',perm:'fyyConsumeRecord',filters:['姓名','商家','支付流水号','支付时间'],cols:['姓名','商家','金额','流水号','支付类型','付款方式','支付时间'],rows:[['张同学','一食堂','12.50','PAY202607080001','消费','社保码','2026-07-08 12:12']]},
 bookRecord:{host:'queryHost',title:'图书借阅记录管理',perm:'fyyBookBorrowRecord',filters:['姓名','书籍题名','条码号'],cols:['姓名','学号/工号','书籍题名','条码号','借阅日期','应还日期','归还日期'],rows:[['张同学','20260001','Python 编程基础','B001','2026-07-01','2026-08-01','-']]},
 schoolUser:{host:'schoolUserHost',title:'用户管理',perm:'fyyUserSummary',filters:['姓名','手机号','用户身份','绑卡状态'],cols:['姓名','手机','用户身份','社保绑卡','省内持卡','首次登录','最近登录'],rows:[['张同学','138****2031','在校生','已绑卡','是','2026-07-01','2026-07-08']]},
 permission:{host:'permissionHost',title:'权限管理',perm:'fyyPlatformPermission',filters:['角色名称','状态'],cols:['对象','类型','状态','操作'],rows:[['平台管理员','角色','启用','授权菜单/按钮/API'],['未来校园模块','模块','显示','配置'],['高校首页菜单','菜单','显示','按钮权限']]},
 logs:{host:'logsHost',title:'日志管理',perm:'fyyPlatformLog',filters:['日志分类','日志名称','执行状态','操作时间'],cols:['分类','名称','执行状态','请求方式','参数摘要','耗时','时间'],rows:[['外部调用','人员同步','失败','POST','已脱敏','3000ms','2026-07-08'],['操作日志','远程配置设备','成功','-','设备ID:***','120ms','2026-07-08']]},
 sync:{host:'syncHost',title:'一卡通后管对接',perm:'fyyNbCardAdminSync',filters:['模块','状态','时间'],cols:['对接模块','数据范围','状态','最近同步','异常数'],rows:[['用户中心','用户/卡包','成功','2026-07-08','0'],['系统监控','接口日志/设备监控','异常','2026-07-08','7']]},
 api:{host:'apiHost',title:'校园类接口建设',perm:'fyyApi',filters:['接口名称','状态','时间'],cols:['接口','方向','关键规则','状态','错误/异常','操作'],rows:[['学院数据初始化','学校->平台','字段校验/去重','成功','0','查看日志'],['人员信息同步','双向','幂等/失败重试','失败','字段缺失','重试'],['电子社保码认证','APP->平台','有效期/防重放','成功','0','详情'],['移动支付交易推送','平台->一卡通','流水幂等/金额校验','待确认','对账规则缺失','标记风险']]},
 pam:{host:'pamHost',title:'PAM 人员管理',perm:'fyyPam',filters:['人员/设备/分组','状态'],cols:['模块','关键数据','操作','状态/异常','权限'],rows:[['组织人员','姓名/证件/部门/掌静脉','录入/更新/导入导出','生物特征需加密','PAM管理员'],['特征库','5万条容量','查询/同步','算法承载待确认','PAM管理员'],['设备分组','区域/类型','批量授权/远程配置','离线/故障告警','设备运维员'],['通行记录','人员/设备/方向/时间','实时同步/导出','离线补传待确认','数据查询员'],['日志','用户操作/设备通信','检索/审计','敏感数据脱敏','审计员'],['子账户','管理范围/操作权限','分级授权','越权拦截','平台管理员']]}
};
const coverage=[
['H5','T0R12~T0R23','H5 学校专区全部 13 个模块','H5 原型独立文件','已覆盖'],
['学校端','T0R24','高校首页','本页高校首页','已覆盖'],['学校端','T0R25','学生/教职工/历史学生','师生管理 Tab','已覆盖'],['学校端','T0R26','banner/应用/模块/公告/文章/活动','内容管理 Tab','已覆盖'],['学校端','T0R27~T0R30','申领/设备/信息查询/用户','对应菜单页','已覆盖'],
['管理端','T0R31~T0R35','系统首页/组织/权限/日志/一卡通对接','管理端菜单页','已覆盖'],['接口','T0R36~T0R43','8 个校园类接口','校园类接口建设页','已覆盖'],['PAM','T0R44~T0R51','8 个 PAM 功能点','PAM 人员管理页','已覆盖']
];
function tag(v){let cls=v==='失败'||v==='异常'||v==='离线'||v==='未绑卡'?'bad':(v==='待审核'||v==='未激活'||v==='待确认'?'warn':'');return `<span class="tag ${cls}">${v}</span>`}
function renderDataset(key,btn){if(btn){btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}const d=datasets[key];const host=document.getElementById(d.host);let filters=d.filters.map(f=>`<input class="field" placeholder="${f}">`).join('');let rows=d.rows.map(r=>`<tr>${r.map(c=>`<td>${String(c).match(/成功|失败|异常|在线|离线|已|未|展示|待审核|启用|可用|报名中/)?tag(c):c}</td>`).join('')}</tr>`).join('');host.innerHTML=`<div class="panel"><b>${d.title}</b><div class="alert">权限标识：${d.perm}；按钮示例：${d.perm}Add / Edit / Delete / Export / Detail。页面参考 Snowy xn-panel + s-table + xn-form-container。</div></div><div class="panel toolbar">${filters}<button class="btn">查询</button><button class="btn secondary">重置</button><button class="btn" onclick="openDrawer('${d.title}表单','${d.cols.join(',')}')">新增/编辑</button><button class="btn secondary">详情</button><button class="btn secondary">导出</button><button class="btn danger">删除/批量删除</button></div><div class="panel table-wrap"><table class="table"><tr>${d.cols.map(c=>`<th>${c}</th>`).join('')}</tr>${rows}</table><div class="alert">状态覆盖：空数据、无权限、接口失败、导出受控、删除确认、长字段横向滚动。</div></div>`}
function renderCoverage(){document.getElementById('coverageHost').innerHTML=`<div class="panel"><b>原型需求覆盖矩阵</b><p>按更新后的工作流，全部功能点均有页面、Tab 或模块承载。</p></div><div class="panel table-wrap"><table class="table matrix"><tr><th>范围</th><th>需求编号</th><th>功能点</th><th>对应页面/弹窗</th><th>覆盖状态</th></tr>${coverage.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table></div>`}
function openDrawer(title,fields){document.getElementById('drawerTitle').textContent=title;document.getElementById('drawerFields').innerHTML=fields.split(',').slice(0,10).map(f=>`<div class="form-row"><label>${f}</label><input placeholder="请输入${f}"></div>`).join('')+`<div class="form-row"><label>状态/备注</label><textarea placeholder="状态、异常、审核意见或备注"></textarea></div>`;document.getElementById('drawer').classList.add('open');document.getElementById('mask').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('mask').classList.remove('open')}
document.querySelectorAll('.menu button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.menu button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(b.dataset.page).classList.remove('hidden');document.getElementById('title').textContent=b.textContent;document.getElementById('crumb').textContent='未来校园 / '+b.textContent;if(b.dataset.page==='coverage')renderCoverage();});
['student','banner','cardApply','device','schoolUser','permission','logs','sync','api','pam'].forEach(k=>renderDataset(k));renderCoverage();
</script>
</body>
