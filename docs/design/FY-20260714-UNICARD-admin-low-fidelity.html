<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宁波市高校一卡通专区后管低保真原型</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ant-design-vue@4.2.6/dist/reset.css" />
  <style>
    :root {
      --sidebar: #001529;
      --sidebar-soft: #031f3a;
      --brand: #1677ff;
      --page: #f5f7fb;
      --line: #edf0f5;
      --text-soft: #667085;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    #app { min-height: 100vh; }
    .app-shell { min-height: 100vh; }
    .brand {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      color: #fff;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }
    .snowy-sider {
      background: var(--sidebar) !important;
      box-shadow: 2px 0 10px rgba(15, 23, 42, .08);
    }
    .snowy-sider .ant-menu {
      background: var(--sidebar);
      color: rgba(255,255,255,.76);
      border-inline-end: 0;
    }
    .snowy-sider .ant-menu-submenu-title,
    .snowy-sider .ant-menu-item { border-radius: 0; margin-inline: 0; width: 100%; }
    .snowy-sider .ant-menu-item-selected {
      background: #0b3a72 !important;
      color: #fff;
      border-left: 3px solid var(--brand);
    }
    .snowy-header {
      height: 56px;
      padding: 0 18px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left, .header-right { display: flex; align-items: center; gap: 14px; }
    .icon-action {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: #475467;
      cursor: pointer;
    }
    .icon-action:hover { background: #f2f4f7; color: var(--brand); }
    .mini-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      min-width: 1em;
      font-weight: 700;
      line-height: 1;
    }
    .tabs-row {
      height: 44px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 8px;
    }
    .content {
      padding: 16px;
      overflow: auto;
    }
    .query-card,
    .table-card,
    .tree-card {
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 4px;
    }
    .query-card { padding: 16px 16px 12px; margin-bottom: 14px; }
    .table-card { padding: 16px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .toolbar-left,
    .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .cover {
      width: 92px;
      height: 46px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #d9e2ef;
      display: block;
      background: #f3f4f6;
    }
    .cover-empty {
      width: 92px;
      height: 46px;
      border-radius: 4px;
      border: 1px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #98a2b3;
      background: #fafafa;
      font-size: 12px;
    }
    .page-title {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .muted { color: var(--text-soft); }
    .tree-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 14px;
    }
    .tree-card { padding: 14px; }
    .resource-node {
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .resource-node:hover,
    .resource-node.active { background: #eef5ff; color: var(--brand); }
    .drawer-cover {
      width: 180px;
      height: 90px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .preset-card {
      background: #fff;
      border: 1px solid #e8edf3;
      border-radius: 4px;
      padding: 14px;
    }
    .preset-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .preset-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      flex-wrap: wrap;
    }
    .text-ellipsis {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: middle;
    }
    .file-thumb {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: #667085;
    }
    .file-thumb.pdf { background: #ef4444; }
    .file-thumb.xls { background: #16a34a; }
    .file-thumb.doc { background: #2563eb; }
    .upload-preview {
      width: 102px;
      height: 102px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: block;
    }
    .annotation-host {
      position: relative;
    }
    .annotation-pin {
      position: absolute;
      top: -14px;
      right: -14px;
      z-index: 5;
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      text-shadow: 0 1px 2px rgba(15, 23, 42, .45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;

      transform: translateY(-1px);
    }

      position: fixed;
      z-index: 1998;
      pointer-events: none;
      border: 2px solid rgba(22, 119, 255, .72);
      border-radius: 3px;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .9);
    }
    .node-comment-outline.selected {
      z-index: 1999;
      border-color: #1677ff;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .95), 0 0 0 5px rgba(22, 119, 255, .16);

    .node-comment-mask {
      position: fixed;

      z-index: 1996;
      background: rgba(15, 23, 42, .08);
      cursor: default;
    }
    .annotation-toolbar {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 2105;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 5px 6px 5px 12px;
      border: 1px solid #dbe3ef;
      border-radius: 12px;
      background: rgba(255, 255, 255, .98);
      color: #1f2937;
      box-shadow: 0 10px 28px rgba(15, 23, 42, .14);
      transform: translateX(-50%);
      backdrop-filter: blur(10px);
    }
    .annotation-toolbar.collapsed {
      min-height: 38px;
      padding: 0;
      border-radius: 10px;
      overflow: hidden;
    }
    .annotation-tool-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding-right: 2px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    .annotation-tool-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #98a2b3;
      box-shadow: 0 0 0 3px rgba(152, 162, 179, .18);
    }
    .annotation-tool-dot.active {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .2);
    }
    .annotation-tool-button {
      height: 30px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      background: #fff;
      color: #344054;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease, color .16s ease;
    }
    .annotation-tool-button:hover {
      border-color: #1677ff;
      background: #f0f7ff;
      color: #1677ff;
    }
    .annotation-tool-button.primary {
      border-color: #1677ff;
      background: #1677ff;
      color: #fff;
    }
    .annotation-tool-button.danger {
      border-color: #ffccc7;
      color: #ff4d4f;
    }
    .annotation-tool-button.danger:hover {
      border-color: #ff4d4f;
      background: #fff1f0;
      color: #cf1322;
    }
    .annotation-tool-button.icon-only {
      width: 30px;
      justify-content: center;
      padding: 0;
    }
    .annotation-toolbar.collapsed .annotation-tool-button.icon-only {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: #344054;
    }
    .annotation-tool-button svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
    }

    .node-comment-popover {
      position: fixed;
      z-index: 2000;
      width: 360px;
      padding: 8px 10px;
      border: 1px solid #e8edf3;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(15, 23, 42, .12);
      transition: border-radius .16s ease, padding .16s ease, box-shadow .16s ease;
    }
    .node-comment-popover.multiline {
      padding: 10px 12px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .14);
    }
    .node-comment-input {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 30px;
      align-items: center;
      gap: 8px;
    }
    .node-comment-popover.multiline .node-comment-input {
      grid-template-rows: minmax(40px, auto) 30px;
      align-items: start;
      column-gap: 8px;
      row-gap: 4px;
    }
    .node-comment-cancel {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #667085;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .node-comment-cancel:hover {
      background: #f2f4f7;
      color: #101828;
    }
    .node-comment-input .ant-input {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      border: 0;
      box-shadow: none !important;
      padding: 0;
      font-size: 14px;
      line-height: 20px;
      background: transparent;
      cursor: text !important;
      resize: none;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #d0d5dd transparent;
    }
    .node-comment-popover.multiline .node-comment-cancel {
      align-self: start;
    }
    .node-comment-popover.multiline .node-comment-input .ant-input {
      grid-column: 2 / 4;
      padding: 4px 2px;
    }
    .node-comment-input .ant-input::-webkit-scrollbar {
      width: 4px;
    }
    .node-comment-input .ant-input::-webkit-scrollbar-thumb {
      border-radius: 4px;
      background: #d0d5dd;
    }
    .node-comment-input .ant-input::-webkit-scrollbar-track {
      background: transparent;
    }
    .node-comment-input .ant-input::-webkit-scrollbar-button {
      display: none;
    }
    .node-comment-submit {
      grid-column: 3;
      grid-row: 1;
      align-self: center;
      justify-self: end;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #f2f4f7;
      color: #475467;
      cursor: default;
      transition: all .16s ease;
    }
    .node-comment-popover.multiline .node-comment-submit {
      grid-row: 2;
      align-self: end;
    }
    .node-comment-submit:disabled {
      opacity: .55;
      cursor: not-allowed !important;
    }
    button.node-comment-submit.ready {
      background-color: #272636 !important;
      color: #fff;
      cursor: pointer !important;
    }
    button.node-comment-submit.ready:hover {
      background-color: #111827 !important;
      transform: translateY(-1px);
    }
    .node-comment-submit svg {
      width: 15px;
      height: 15px;
      display: block;
      stroke: currentColor;
    }
    .node-comment-pin {
      position: fixed;
      z-index: 999;
      width: 30px;
      height: 30px;
      border: 0;
      background-color: transparent;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      text-shadow: 0 1px 2px rgba(15, 23, 42, .45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .node-comment-pin.draft {
      opacity: .9;
      filter: saturate(.9);
    }
    .annotation-detail-view {
      display: grid;
      gap: 14px;
    }
    .annotation-detail-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .annotation-detail-title .annotation-editable {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }
    .annotation-detail-title .ant-input {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
    }
    .annotation-detail-index {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1677ff;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .annotation-editable {
      position: relative;
      min-height: 32px;
      padding: 6px 38px 6px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      line-height: 1.7;
      cursor: default;
      white-space: pre-wrap;
    }
    .annotation-editable:hover {
      border-color: #d0d5dd;
      background: #f8fafc;
    }
    .requirement-preview {
      min-height: 220px;
      padding: 12px 42px 12px 12px;
      color: #344054;
      line-height: 1.8;
      white-space: pre-wrap;
      cursor: default;
    }
    .annotation-editable.muted {
      color: #667085;
    }
    .annotation-edit-action {
      position: absolute;
      top: 5px;
      right: 6px;
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 6px;
      background: #eef4ff;
      color: #1677ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      cursor: pointer;
      transition: opacity .16s ease, background-color .16s ease;
    }
    .annotation-editable:hover .annotation-edit-action,
    .annotation-edit-action:focus-visible {
      opacity: 1;
    }
    .annotation-edit-action:hover {
      background: #dbeafe;
    }
    .annotation-edit-action svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }
    .annotation-modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .annotation-modal-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    @media (max-width: 960px) {
      .tree-layout { grid-template-columns: 1fr; }
      .preset-grid { grid-template-columns: 1fr; }
      .snowy-sider { display: none; }
    }
  </style>

  <style>

        </a-layout>
        <a-drawer class="a-drawer" v-model:open="detailOpen" width="680" :title="active.title+'详情'"><div class="drawer-grid"><div v-for="field in active.details" :key="field" class="detail-item"><span class="detail-label">{{field}}</span><img v-if="isImage(field)" class="thumb" :src="(detailRow&&detailRow[field])||demoImage"/><a-tag v-else-if="isStatus(field)" :color="tagColor(detailRow&&detailRow[field])">{{(detailRow&&detailRow[field])||sampleValue(field)}}</a-tag><span v-else :class="{'field-mask':isSensitive(field),'amount-cell':isAmount(field)}">{{(detailRow&&detailRow[field])||sampleValue(field)}}</span></div></div><div class="risk-note" v-if="active.sensitive.length"><strong>敏感字段：</strong>{{active.sensitive.join('、')}}。详情仍执行脱敏与权限控制，并记录访问审计。</div></a-drawer>
        <a-drawer class="a-drawer" v-model:open="formOpen" width="620" :title="(formMode==='add'?'新增':'编辑')+active.title"><a-form layout="vertical"><a-form-item v-for="field in formFields" :key="field" :label="field"><template v-if="isImage(field)"><input :data-node-key="active.id+':form-upload:'+field" type="file" accept="image/*" @change="uploadChange"/><div v-if="uploadPreview||formState[field]" class="upload-preview"><img :src="uploadPreview||formState[field]"/><a-button :data-node-key="active.id+':form-upload-remove:'+field" danger @click="uploadPreview='';formState[field]=''">移除</a-button></div></template><a-tree-select v-else-if="/权限|范围|部门|组织/.test(field)" v-model:value="formState[field]" tree-default-expand-all :tree-data="[{title:'本校',value:'本校',children:[{title:'本部门',value:'本部门'}]}]"/><a-switch v-else-if="isSwitch(field)" :checked="formState[field]==='启用'" @change="v=>formState[field]=v?'启用':'停用'"/><a-input-number v-else-if="isAmount(field)" v-model:value="formState[field]" style="width:100%"/><a-input v-else v-model:value="formState[field]"/></a-form-item></a-form><template #footer><a-space><a-button type="primary" @click="saveForm">保存</a-button><a-button @click="formOpen=false">取消</a-button></a-space></template></a-drawer>
        <a-modal class="a-modal" v-model:open="importOpen" :title="actionTitle+' · 文件选择与预校验'"><input data-node-key="import:file" type="file" accept=".xlsx,.xls,.csv" @change="importChange"/><div class="upload-preview" v-if="importFile"><a-tag color="blue">{{importFile}}</a-tag><a-button data-node-key="import:remove" danger @click="importFile='';importResult=null">移除</a-button></div><p>提交后先执行格式、重复项、权限范围与异常数据校验，再展示成功/失败数量和逐项原因。</p><a-alert v-if="importResult" type="warning" show-icon :message="'预校验：成功 '+importResult.success+' 条，失败 '+importResult.failed+' 条'"><template #description><ul><li v-for="error in importResult.errors" :key="error">{{error}}</li></ul></template></a-alert><template #footer><a-space><a-button @click="importOpen=false">{{importResult?'完成':'取消'}}</a-button><a-button v-if="!importResult" data-node-key="import:validate" type="primary" @click="confirmImport">开始预校验</a-button></a-space></template></a-modal>
        <a-modal class="a-modal" v-model:open="exportOpen" title="受控导出确认" @ok="confirmExport"><a-form layout="vertical"><a-form-item label="导出用途"><a-input value="业务核验"/></a-form-item><a-form-item label="导出范围"><a-select value="当前查询结果" :options="[{value:'当前查询结果',label:'当前查询结果'}]"/></a-form-item></a-form><p>敏感字段默认脱敏；系统记录导出人、时间、条件、用途和结果。</p></a-modal>
        <a-modal class="a-modal" v-model:open="authorizationOpen" :title="actionTitle+' · 权限范围变更'" @ok="confirmAuthorization"><a-descriptions bordered :column="1"><a-descriptions-item label="当前角色">{{currentRole}}</a-descriptions-item><a-descriptions-item label="当前范围">{{authorizationCurrent}}</a-descriptions-item></a-descriptions><a-form layout="vertical" style="margin-top:16px"><a-form-item label="变更范围（组织/资源树）"><a-tree-select data-node-key="authorization:tree" v-model:value="authorizationNext" tree-default-expand-all style="width:100%" :tree-data="[{title:'宁波纺织学院',value:'本校',children:[{title:'当前部门',value:'本部门',children:[{title:'本人负责资源',value:'本人'}]}]},{title:'全平台（仅平台管理员）',value:'全平台'}]"/></a-form-item></a-form><a-alert v-if="authorizationError" type="error" show-icon :message="authorizationError"/><p>保存前校验当前账号管理边界；变更前后范围和操作者写入审计日志。</p></a-modal>
        <a-modal class="a-modal" v-model:open="auditOpen" :title="actionTitle+' · 审核处理'" @ok="confirmAudit"><a-form layout="vertical"><a-form-item label="审核结论"><a-radio-group data-node-key="audit:decision" v-model:value="auditDecision"><a-radio value="通过">通过</a-radio><a-radio value="驳回">驳回</a-radio></a-radio-group></a-form-item><a-form-item label="审核意见"><a-textarea data-node-key="audit:opinion" v-model:value="auditOpinion" :auto-size="{minRows:3,maxRows:8}"/></a-form-item></a-form><p>确认后更新审核状态，并记录审核人、时间、意见和前后值。</p></a-modal>
        <a-modal class="a-modal" v-model:open="statusOpen" :title="statusContext.action+'确认'" @ok="confirmStatus"><a-descriptions bordered :column="1"><a-descriptions-item label="字段">{{statusContext.field}}</a-descriptions-item><a-descriptions-item label="当前值">{{statusContext.current}}</a-descriptions-item><a-descriptions-item label="变更为">{{statusContext.next}}</a-descriptions-item></a-descriptions><p>状态切换需二次确认；确认后更新当前行并留存审计记录。</p></a-modal>
        <a-modal class="a-modal" v-model:open="actionOpen" :title="actionTitle+'确认'" @ok="confirmAction"><pre style="white-space:pre-wrap">{{actionText}}</pre><div v-if="actionTitle.includes('远程设备配置')"><a-form layout="vertical"><a-form-item label="认证模式"><a-select value="掌静脉优先" :options="[{value:'掌静脉优先',label:'掌静脉优先'},{value:'卡片优先',label:'卡片优先'}]"/></a-form-item><a-form-item label="识别参数"><a-input value="阈值 0.82"/></a-form-item></a-form></div></a-modal>
        <a-drawer v-model:open="requirementDrawerOpen" width="620" :title="active.title+' · 页面需求'"><div v-if="!requirementEditing" class="requirement-preview">{{requirementDraft}}<a-button class="requirement-edit" size="small" @click="requirementEditing=true">编辑</a-button></div><a-textarea v-else v-model:value="requirementDraft" :auto-size="{minRows:8,maxRows:18}"/><template #footer><a-space v-if="requirementEditing"><a-button v-if="requirementDirty" type="primary" @click="saveRequirement">保存</a-button><a-button @click="cancelRequirement">取消</a-button></a-space></template></a-drawer>
        <a-drawer v-model:open="annotationDrawerOpen" width="560" :title="active.title+' · 标注清单'"><a-button v-if="hiddenBaselineIds.some(id=>id.startsWith(active.id+'-'))" style="margin-bottom:12px" @click="restoreHiddenAnnotations">恢复隐藏的自动标注</a-button><div class="annotation-list"><div v-for="note in currentAnnotations" :key="note.id" class="annotation-row"><div class="annotation-row-title"><strong>{{note.index}}. {{note.title}}</strong><a-space><a @click="editAnnotation(note)">编辑</a><a class="danger-link" @click="deleteAnnotation(note)">{{note.baseline?'删除自动标注':'删除'}}</a></a-space></div><p>{{note.summary}}</p></div></div></a-drawer>
        <a-modal v-model:open="matrixOpen" width="96vw" title="原型需求覆盖矩阵" :footer="null"><div class="matrix-wrap"><table class="coverage-table"><thead><tr><th>需求编号</th><th>功能点</th><th>页面/弹窗/抽屉</th><th>蓝图条目</th><th>字段</th><th>操作</th><th>状态/异常</th><th>权限</th><th>覆盖状态</th><th>说明</th></tr></thead><tbody><tr v-for="page in pageSpecs" :key="page.id"><td>{{page.id}}</td><td>{{page.title}}</td><td>{{page.menuPath}}；详情抽屉<span v-if="page.create.length">；新增抽屉</span><span v-if="page.edit.length">；编辑抽屉</span></td><td>原始需求摘录、原子需求清单、页面结构、字段明细、操作交互</td><td>{{[...page.query,...page.display,...page.details].filter((v,i,a)=>a.indexOf(v)===i).join('、')}}</td><td>查询、重置<span v-if="page.actions.length">、{{page.actions.join('、')}}</span></td><td>{{[...page.status,...page.exceptions].join('；')||'加载、空数据、接口异常、无权限'}}</td><td>{{page.roles}}；{{page.permission}}</td><td><a-tag color="green">已覆盖</a-tag></td><td>逐页专属字段与交互；可由页面菜单直接验证</td></tr></tbody></table></div></a-modal>
        <div v-if="nodeCommentOpen" class="node-comment-popover" :style="nodeCommentStyle" @click.stop><strong>添加节点注释</strong><textarea id="node-comment-text" v-model="annotationText" rows="3" placeholder="Enter 换行；点击发送提交"></textarea><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px"><a-button @click="clearNodeSelection">取消</a-button><a-button type="primary" :disabled="!annotationText.trim()" @click="saveNodeComment">发送</a-button></div></div>
      </a-layout>`
    });
    app.use(antd).mount('#app');
  </script>
</body></html>
